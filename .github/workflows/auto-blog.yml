name: Weekly Blog Post

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 2pm UTC (10am ET)
  workflow_dispatch:       # Run manually any time from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: python scripts/generate-post.py

      - name: Commit and push
        run: |
          git config user.name "East Agency Bot"
          git config user.email "brannoneast1@gmail.com"
          git add blog/ blog.html sitemap.xml
          git diff --staged --quiet && echo "No new post generated" || git commit -m "Auto blog: ${{ env.POST_TITLE }}"
          git push
